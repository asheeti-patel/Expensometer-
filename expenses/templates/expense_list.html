<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Expenses</title>

  <!-- ✅ Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(-45deg, #74ebd5, #ACB6E5, #fddb92, #d1fdff);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .page-wrapper {
      padding: 20px;
      padding-bottom: 150px;
    }

    #sticky-header {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(5px);
      padding: 15px 0;
      text-align: center;
      z-index: 999;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    #sticky-header h2 {
      margin: 0;
      font-size: 2rem;
      color: #2e86de;
    }

    form {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      margin: 30px auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      max-width: 900px;
    }

    form label {
      font-weight: 600;
      color: #333;
    }

    form select,
    form input[type='date'],
    form button {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    form button {
      background-color: #2e86de;
      color: white;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.3s ease;
    }

    form button:hover {
      background-color: #1b4f72;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    table thead {
      background-color: #2e86de;
      color: white;
    }

    table th,
    table td {
      padding: 14px 16px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    table tr:nth-child(even) {
      background-color: #f7f9fc;
    }

    .update-btn {
      background-color: #f6c700;
      color: #333;
      padding: 8px 14px;
      font-size: 14px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .update-btn:hover {
      background-color: #e0b100;
      color: black;
    }

    a.add-expense {
      display: inline-block;
      margin: 30px 0;
      text-decoration: none;
      background-color: #007bff;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      transition: background 0.3s;
    }

    a.add-expense:hover {
      background-color: #005bb5;
    }

    .moving-gif {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 100px;
      height: auto;
      z-index: 100;
      animation: slideRightToLeft 6s linear infinite;
    }

    @keyframes slideRightToLeft {
      0% { right: -120px; }
      100% { right: 100vw; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div id="sticky-header">
      <h2>My Expenses</h2>
    </div>

    <!-- Filter Form -->
    <form method="get">
      <label>Category:</label>
      <select name="category">
        <option value="">All</option>
        {% for code, name in categories %}
          <option value="{{ code }}" {% if code == selected_category %}selected{% endif %}>{{ name }}</option>
        {% endfor %}
      </select>

      <label>Start Date:</label>
      <input type="date" name="start_date" value="{{ start_date }}" />

      <label>End Date:</label>
      <input type="date" name="end_date" value="{{ end_date }}" />

      <button type="submit">Filter</button>
    </form>

    <!-- Expense Table -->
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Amount</th>
          <th>Category</th>
          <th>Description</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for expense in expenses %}
        <tr>
          <td>{{ expense.date }}</td>
          <td>₹{{ expense.amount }}</td>
          <td>{{ expense.category }}</td>
          <td>{{ expense.expense_name }}</td>
          <td>
            <a href="{% url 'update_expense' expense.id %}" class="update-btn">✏️ Update</a>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="5">No expenses found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <a href="{% url 'add_expense' %}" class="add-expense">➕ Add New Expense</a>

    <!-- You can re-enable moving gif here if needed -->
    <!-- <img src="your-gif-url.gif" class="moving-gif" /> -->
  </div>
</body>
</html>
